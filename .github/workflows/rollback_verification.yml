name: Rollback Verification (self-hosted)

on:
  workflow_dispatch:
  push:
    paths:
      - 'deploy/pi/**'

jobs:
  verify-rollback-guard:
    name: Verify rollback guard
    runs-on: [self-hosted, privileged]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run rollback guard validation
        run: |
          python scripts/validate_rollback_guard.py
