name: DB smoke test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - feature/db-default-no-file-fallback

jobs:
  db-smoke:
    runs-on: ubuntu-latest
    name: DB smoke check
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
      - name: Run DB streaming smoke check
        run: |
          bash scripts/check_db_streaming.sh
