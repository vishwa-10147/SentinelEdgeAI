name: Privileged Integration Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  privileged-integration:
    # This job is intended to run on a self-hosted runner that has
    # the necessary privileges and labels (e.g., 'self-hosted', 'privileged').
    runs-on: [self-hosted, linux, x64, privileged]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run privileged integration tests
        run: |
          # This script should run tests that require privileged/network access.
          # Ensure the self-hosted runner is configured and trusted before running.
          pytest tests/integration/ -q || true
