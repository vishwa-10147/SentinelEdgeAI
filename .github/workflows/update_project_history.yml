name: Update PROJECT_HISTORY on release

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append release entry to PROJECT_HISTORY
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          DATE="$(date -u +%F)"
          echo "" >> docs/PROJECT_HISTORY.md
          echo "${DATE}: Release ${TAG}" >> docs/PROJECT_HISTORY.md
          echo "- Automated update: release workflow appended entry." >> docs/PROJECT_HISTORY.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_HISTORY.md
          git commit -m "ci: update PROJECT_HISTORY for ${TAG}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed (branch protection may block direct pushes)"
