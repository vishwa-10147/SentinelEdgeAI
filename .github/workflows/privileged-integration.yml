name: Privileged Integration Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'tests/**'
      - 'core/**'

permissions:
  contents: read

jobs:
  firewall-integration:
    name: Run privileged firewall integration tests
    # This job is intended to run on a self-hosted runner with Docker and NET_ADMIN capability.
    runs-on: [self-hosted, linux, docker]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest || true
      - name: Build and run privileged firewall integration tests
        env:
          SENTINEL_RUN_FIREWALL_CONTAINER_TESTS: '1'
        run: |
          pytest -q tests/test_firewall_container_integration.py

  rollback-guard-validation:
    name: Rollback guard validation (optional)
    if: ${{ github.event.inputs != null && github.event.inputs.run_rollback_validation == 'true' }}
    runs-on: [self-hosted, linux, docker]
    needs: firewall-integration
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest || true
      - name: Validate rollback guard behavior
        env:
          VENV_PYTHON: python
        run: |
          python scripts/validate_rollback_guard.py

  notes:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow must be executed on a self-hosted runner with Docker and NET_ADMIN. See deploy/pi/README.md for setup instructions."
