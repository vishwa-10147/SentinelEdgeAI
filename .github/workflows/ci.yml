name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  name: CI

  on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]

  jobs:
    tests:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.11'
        - name: Install Python deps
          run: |
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            pip install pytest scapy
        - name: Run tests (unit + pcap replay)
          run: |
            PYTHONPATH=. pytest -q

    frontend_build:
      runs-on: ubuntu-latest
      needs: tests
      steps:
        - uses: actions/checkout@v4
        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: '18'
        - name: Build frontend
          working-directory: frontend
          run: |
            npm ci --legacy-peer-deps
            npm run build

    # Optional deployment step (kept simple):
    deploy_to_render:
      needs: [tests, frontend_build]
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' && secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != ''
      steps:
        - uses: actions/checkout@v4
        - name: Trigger Render deploy
          env:
            RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
            RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          run: |
            echo "Triggering deploy for service $RENDER_SERVICE_ID"
            curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}' | jq -r '.message // .id // .status'
      - name: Build frontend
