name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest requests
      - name: Run tests
        run: |
          PYTHONPATH=. pytest -q
      - name: Run e2e smoke (skip if no service)
        run: |
          python scripts/e2e_smoke.py || true

  health-check:
    if: secrets.HEALTH_TEST_PASS != ''
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run health endpoint check
        env:
          HEALTH_USER: health
          HEALTH_PASS: ${{ secrets.HEALTH_TEST_PASS }}
          CI_HEALTH_PORT: 5050
        run: |
          python scripts/ci_health_probe.py
