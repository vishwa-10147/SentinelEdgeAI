name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest requests
      - name: Run tests
        run: |
          PYTHONPATH=. pytest -q
      - name: Run e2e smoke (skip if no service)
        run: |
          python scripts/e2e_smoke.py || true

  health-check:
    if: secrets.HEALTH_TEST_PASS != ''
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run health endpoint check
        env:
          HEALTH_USER: health
          HEALTH_PASS: ${{ secrets.HEALTH_TEST_PASS }}
          CI_HEALTH_PORT: 5050
        run: |
          python scripts/ci_health_probe.py

  vault-fetcher-test:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install Vault CLI
        uses: hashicorp/setup-vault@v2
        with:
          vault_version: '1.14.0'
      - name: Start Vault dev server
        run: |
          nohup vault server -dev -dev-root-token-id=root -dev-listen-address=127.0.0.1:8200 > vault.log 2>&1 &
          sleep 1
      - name: Configure Vault and write secret
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: root
        run: |
          export VAULT_ADDR=http://127.0.0.1:8200
          export VAULT_TOKEN=root
          # ensure kv engine available (ignore errors)
          vault secrets enable -path=secret -version=2 kv || true
          vault kv put secret/sentineledge/health HEALTH_PASS=ci-pass
          vault kv get secret/sentineledge/health
      - name: Run fetcher script against Vault
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_TOKEN: root
          VAULT_SECRET_PATH: secret/sentineledge/health
        run: |
          sudo bash scripts/fetch_health_from_vault.sh
      - name: Verify health env written
        run: |
          sudo cat /etc/sentinel/health.env
      - name: Cleanup vault and test artifact
        run: |
          sudo rm -f /etc/sentinel/health.env || true
          pkill -f 'vault server' || true
          sleep 1
