groups:
  - name: sentineledge.rules
    rules:
      - alert: SentinelHealthDown
        expr: up{job="sentinel"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SentinelEdgeAI health endpoint is down (instance={{ $labels.instance }})"
          description: "Prometheus failed to scrape the /health endpoint for more than 5 minutes."

      - alert: SentinelRotateFailed
        # Requires node_exporter systemd collector or equivalent exposing unit state.
        expr: systemd_unit_state_active{unit="sentinel-rotate.service"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sentinel rotation service not active"
          description: "The sentinel-rotate.service is not active on {{ $labels.instance }} for at least 10 minutes. Check systemd logs and rotation outputs."

      - alert: SentinelVaultFetcherTimerInactive
        # Alerts when the Vault fetcher timer is not active. Requires node_exporter systemd collector.
        expr: systemd_unit_state_active{unit="sentinel-health-vault.timer"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Sentinel Vault fetcher timer not active"
          description: "The sentinel-health-vault.timer is not active on {{ $labels.instance }} for at least 30 minutes. Verify timer and service installation."

      - alert: SentinelLastFetchStale
        # Fires when the last successful Vault fetch is older than 36h (requires node_exporter textfile_collector exposing `sentinel_last_fetch_timestamp`).
        expr: time() - sentinel_last_fetch_timestamp > 129600
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Sentinel Vault fetcher has not fetched secrets recently"
          description: "No successful Vault fetch recorded for over 36 hours on {{ $labels.instance }}. Check the fetcher service, Vault connectivity, and logs."
