global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sentineledgeai'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:9000']

  # node exporter or other exporters can be added here for Pi metrics
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
